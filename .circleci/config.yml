version: 2.1

orbs:
  win: circleci/windows@5.0

parameters:
  windows_release_artifacts:
    type: boolean
    default: false

jobs:
  windows-release:
    executor:
      name: win/default
      size: medium
    steps:
      - checkout
      - run:
          name: Install Rust
          shell: powershell.exe
          command: |
            Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile "rustup-init.exe"
            .\rustup-init.exe -y --default-toolchain 1.94.0 --profile minimal
      - run:
          name: Build Windows artifact for dx-py-package-manager and cpython
          shell: powershell.exe
          command: |
            $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
            $ErrorActionPreference = "Stop"
            New-Item -ItemType Directory -Path dist -Force | Out-Null
            
            cd package-manager
            $env:CIRCLECI_GH_TOKEN = [System.Environment]::GetEnvironmentVariable("CIRCLECI_GH_TOKEN")
            git config --global url."https://x-access-token:$env:CIRCLECI_GH_TOKEN@github.com/".insteadOf "https://github.com/"
            git config --global url."https://x-access-token:$env:CIRCLECI_GH_TOKEN@github.com/".insteadOf "ssh://git@github.com/"
            $env:CARGO_NET_GIT_FETCH_WITH_CLI = "true"
            cargo build --release -p dx-py-package-manager
            Copy-Item -LiteralPath "target\release\dx-py-package-manager.exe" -Destination "..\dist\dx-py-package-manager.exe" -Force
            cd ..
            
            cd cpython\PCbuild
            cmd.exe /c build.bat -p x64
            Copy-Item -Path "amd64\*.exe" -Destination "..\..\dist\" -Force
            Copy-Item -Path "amd64\*.dll" -Destination "..\..\dist\" -Force
            cd ..\..
            
            $shortSha = $env:CIRCLE_SHA1.Substring(0, 12)
            $archive = "dx-py-windows-x86_64-$shortSha.zip"
            Compress-Archive -Path "dist\*" -DestinationPath "dist\$archive" -Force
            $hash = Get-FileHash -Algorithm SHA256 -LiteralPath "dist\$archive"
            "$($hash.Hash.ToLowerInvariant())  $archive" | Set-Content -LiteralPath "dist\SHA256SUMS.txt" -Encoding ASCII
      - store_artifacts:
          path: dist
      - run:
          name: Upload to GitHub release essence-dx/py
          shell: powershell.exe
          command: |
            
            refreshenv
            $env:GH_TOKEN = [System.Environment]::GetEnvironmentVariable("CIRCLECI_GH_TOKEN")
            $tag = "windows"
            gh release create $tag --repo essence-dx/py --title "Windows build" --notes "CI Windows artifact" --target $env:CIRCLE_SHA1 2>$null; $LASTEXITCODE = 0
            gh release upload $tag dist\dx-py-windows-x86_64-*.zip --repo essence-dx/py --clobber
      # Note: for dx-py (cpython), a full Python Windows build is heavy; for now the package-manager is bundled. cpython can be added later or use prebuilt.


